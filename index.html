<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="About Cornelius Aurelius — inventor, creator, colour-blind thinker, failed football player, obsessive learner and builder of tools designed to help people waste less time." />
  <meta name="theme-color" content="#020712" />
  <title>About Cornelius Aurelius | Inventor, Creator, Colour-Blind Thinker</title>

  <style>
    :root {
      --bg: #020712;
      --bg2: #061524;
      --panel: rgba(255,255,255,0.075);
      --panel2: rgba(0,217,255,0.08);
      --neon: #00e7ff;
      --neon2: #68f6ff;
      --text: #f4fbff;
      --muted: #a9bdc9;
      --soft: #d9f7ff;
      --line: rgba(0,231,255,0.28);
      --danger: #ff5d9e;
      --good: #75ffb8;
      --gold: #ffe78a;
      --shadow: 0 25px 80px rgba(0, 231, 255, 0.15);
      --radius: 28px;
      --max: 1180px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at 15% 10%, rgba(0, 231, 255, 0.22), transparent 30%),
        radial-gradient(circle at 90% 20%, rgba(0, 102, 255, 0.18), transparent 34%),
        radial-gradient(circle at 50% 90%, rgba(255, 255, 255, 0.08), transparent 24%),
        linear-gradient(135deg, #01040b 0%, #03101d 45%, #020712 100%);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      overflow-x: hidden;
      line-height: 1.65;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: radial-gradient(circle at center, black, transparent 76%);
      opacity: .55;
      z-index: -2;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(180deg, transparent, rgba(0,0,0,.45));
      z-index: -1;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img, svg {
      max-width: 100%;
      display: block;
    }

    .skip-link {
      position: absolute;
      left: -999px;
      top: 10px;
      background: var(--neon);
      color: #001016;
      padding: 10px 14px;
      border-radius: 12px;
      z-index: 99;
      font-weight: 900;
    }

    .skip-link:focus {
      left: 12px;
    }

    .wrap {
      width: min(var(--max), calc(100% - 28px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(18px);
      background: rgba(2,7,18,.76);
      border-bottom: 1px solid rgba(0,231,255,.16);
    }

    .nav {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 220px;
    }

    .logo-mark {
      width: 42px;
      height: 42px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: #001016;
      font-weight: 1000;
      letter-spacing: -2px;
      background: linear-gradient(135deg, var(--neon), #ffffff);
      box-shadow: 0 0 28px rgba(0,231,255,.45);
    }

    .brand strong {
      display: block;
      font-size: .92rem;
      letter-spacing: .13em;
      text-transform: uppercase;
      line-height: 1.1;
    }

    .brand span {
      display: block;
      font-size: .76rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .nav-links {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .nav-links a {
      font-size: .82rem;
      color: var(--muted);
      border: 1px solid transparent;
      padding: 9px 11px;
      border-radius: 999px;
      transition: .25s ease;
    }

    .nav-links a.home-icon {
      color: #001016;
      background: linear-gradient(135deg, var(--neon), #ffffff);
      border-color: transparent;
      font-weight: 1000;
      box-shadow: 0 0 24px rgba(0,231,255,.28);
    }

    .nav-links a:hover,
    .nav-links a:focus-visible {
      color: var(--text);
      border-color: rgba(0,231,255,.35);
      background: rgba(0,231,255,.08);
      outline: none;
    }

    /* Hamburger Menu Styles */
    .menu-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 8px;
      z-index: 51;
    }

    .menu-toggle span {
      width: 24px;
      height: 2px;
      background: var(--neon);
      border-radius: 2px;
      transition: .3s ease;
      display: block;
    }

    .menu-toggle.active span:nth-child(1) {
      transform: rotate(45deg) translate(8px, 8px);
    }

    .menu-toggle.active span:nth-child(2) {
      opacity: 0;
    }

    .menu-toggle.active span:nth-child(3) {
      transform: rotate(-45deg) translate(7px, -7px);
    }

    /* Mobile Menu Styles */
    .mobile-menu {
      display: none;
      position: absolute;
      top: 72px;
      left: 0;
      right: 0;
      background: rgba(2,7,18,.95);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(0,231,255,.16);
      padding: 16px;
      flex-direction: column;
      gap: 12px;
      z-index: 49;
    }

    .mobile-menu.active {
      display: flex;
    }

    .mobile-menu a {
      font-size: .82rem;
      color: var(--muted);
      border: 1px solid transparent;
      padding: 12px 14px;
      border-radius: 12px;
      transition: .25s ease;
      display: block;
      text-align: center;
    }

    .mobile-menu a:hover,
    .mobile-menu a:focus-visible {
      color: var(--text);
      border-color: rgba(0,231,255,.35);
      background: rgba(0,231,255,.08);
      outline: none;
    }

    .mobile-menu a.home-icon {
      color: #001016;
      background: linear-gradient(135deg, var(--neon), #ffffff);
      border-color: transparent;
      font-weight: 1000;
      box-shadow: 0 0 24px rgba(0,231,255,.28);
    }

    .hero {
      position: relative;
      padding: clamp(54px, 9vw, 112px) 0 44px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(300px, .72fr);
      gap: 28px;
      align-items: stretch;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      width: fit-content;
      color: var(--neon2);
      border: 1px solid rgba(0,231,255,.28);
      background: rgba(0,231,255,.08);
      padding: 9px 13px;
      border-radius: 999px;
      font-weight: 800;
      font-size: .82rem;
      letter-spacing: .08em;
      text-transform: uppercase;
      box-shadow: 0 0 38px rgba(0,231,255,.09);
      margin-bottom: 22px;
    }

    .pulse-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--neon);
      box-shadow: 0 0 16px var(--neon);
      animation: pulse 1.8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: .75; }
      50% { transform: scale(1.45); opacity: 1; }
    }

    h1 {
      font-size: clamp(3rem, 8.4vw, 7.5rem);
      line-height: .88;
      letter-spacing: -.075em;
      max-width: 880px;
      margin-bottom: 24px;
      text-wrap: balance;
    }

    .neon-text {
      color: var(--neon);
      text-shadow: 0 0 26px rgba(0,231,255,.45);
    }

    .hero-lede {
      font-size: clamp(1.07rem, 2.2vw, 1.42rem);
      color: var(--soft);
      max-width: 740px;
      margin-bottom: 26px;
    }

    .hero-lede strong {
      color: #fff;
    }

    .hero-thumbnail {
      position: relative;
      width: min(100%, 360px);
      max-width: 360px;
      justify-self: end;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid rgba(0,231,255,.28);
      background: rgba(0,0,0,.35);
      box-shadow: var(--shadow);
    }

    .hero-thumbnail img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      object-position: center;
      filter: contrast(1.03) saturate(1.04);
    }

    .hero-thumbnail-caption {
      display: none;
    }

    .pronounce-card {
      position: relative;
      background: linear-gradient(145deg, rgba(255,255,255,.11), rgba(0,231,255,.055));
      border: 1px solid rgba(0,231,255,.23);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .pronounce-card::before {
      content: "";
      position: absolute;
      inset: -80px -80px auto auto;
      width: 180px;
      height: 180px;
      background: rgba(0,231,255,.24);
      filter: blur(44px);
      border-radius: 50%;
    }

    .pronounce-card h2 {
      position: relative;
      font-size: clamp(1.35rem, 2.6vw, 2rem);
      line-height: 1.1;
      letter-spacing: -.03em;
      margin-bottom: 14px;
    }

    .pronounce {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 9px;
      margin: 18px 0;
    }

    .sound {
      min-height: 72px;
      border: 1px solid rgba(255,255,255,.14);
      border-radius: 20px;
      background: rgba(0,0,0,.28);
      display: grid;
      place-items: center;
      text-align: center;
      padding: 10px;
    }

    .sound b {
      color: #001016;
      background: var(--neon);
      border-radius: 999px;
      padding: 5px 10px;
      line-height: 1;
      box-shadow: 0 0 18px rgba(0,231,255,.36);
    }

    .sound small {
      display: block;
      color: var(--muted);
      margin-top: 7px;
      font-weight: 700;
    }

    .mini-note {
      color: var(--muted);
      font-size: .95rem;
    }

    .cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 28px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-height: 50px;
      padding: 13px 17px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.08);
      color: var(--text);
      font-weight: 900;
      transition: .25s ease;
      box-shadow: 0 12px 34px rgba(0,0,0,.22);
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(0,231,255,.45);
      background: rgba(0,231,255,.12);
      outline: none;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--neon), #ffffff);
      color: #001016;
      border-color: transparent;
      box-shadow: 0 20px 60px rgba(0,231,255,.26);
    }

    .btn.danger {
      background: rgba(255,93,158,.1);
      border-color: rgba(255,93,158,.38);
    }

    .hero-side {
      display: grid;
      gap: 16px;
    }

    .identity-card {
      min-height: 250px;
      border-radius: var(--radius);
      border: 1px solid rgba(0,231,255,.2);
      background:
        radial-gradient(circle at 25% 20%, rgba(0,231,255,.23), transparent 34%),
        radial-gradient(circle at 80% 90%, rgba(255,255,255,.1), transparent 38%),
        rgba(255,255,255,.07);
      padding: 22px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      overflow: hidden;
      position: relative;
    }

    .identity-card::after {
      content: "C A";
      position: absolute;
      right: -22px;
      bottom: -48px;
      font-size: 9rem;
      line-height: 1;
      font-weight: 1000;
      color: rgba(255,255,255,.035);
      letter-spacing: -.12em;
    }

    .identity-card p {
      position: relative;
      color: var(--soft);
      font-size: 1.02rem;
    }

    .identity-list {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 18px;
    }

    .tag {
      border: 1px solid rgba(0,231,255,.24);
      background: rgba(0,0,0,.25);
      color: var(--soft);
      border-radius: 999px;
      padding: 8px 10px;
      font-size: .83rem;
      font-weight: 800;
    }

    .win-card {
      border-radius: var(--radius);
      border: 1px solid rgba(117,255,184,.22);
      background: linear-gradient(145deg, rgba(117,255,184,.12), rgba(0,231,255,.06));
      padding: 22px;
    }

    .win-card b {
      color: var(--good);
      display: block;
      margin-bottom: 8px;
      letter-spacing: .06em;
      text-transform: uppercase;
      font-size: .78rem;
    }

    .win-card p {
      color: var(--soft);
      font-size: 1rem;
    }

    .ticker {
      overflow: hidden;
      border-block: 1px solid rgba(0,231,255,.18);
      background: rgba(0,0,0,.25);
      margin: 24px 0 0;
    }

    .ticker-track {
      display: flex;
      width: max-content;
      animation: scroll 32s linear infinite;
    }

    .ticker span {
      display: inline-flex;
      gap: 10px;
      align-items: center;
      padding: 14px 18px;
      color: var(--muted);
      white-space: nowrap;
      font-weight: 800;
      font-size: .88rem;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .ticker i {
      width: 6px;
      height: 6px;
      border-radius: 99px;
      background: var(--neon);
      box-shadow: 0 0 10px rgba(0,231,255,.75);
    }

    @keyframes scroll {
      to { transform: translateX(-50%); }
    }

    section {
      padding: clamp(54px, 7vw, 92px) 0;
      position: relative;
    }

    .section-head {
      max-width: 760px;
      margin-bottom: 26px;
    }

    .kicker {
      color: var(--neon2);
      font-weight: 1000;
      letter-spacing: .14em;
      text-transform: uppercase;
      font-size: .78rem;
      margin-bottom: 10px;
    }

    h2 {
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: .96;
      letter-spacing: -.055em;
      margin-bottom: 16px;
      text-wrap: balance;
    }

    .section-head p {
      color: var(--muted);
      font-size: 1.05rem;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    .card {
      border: 1px solid rgba(0,231,255,.17);
      background: rgba(255,255,255,.065);
      border-radius: var(--radius);
      padding: 23px;
      box-shadow: 0 18px 54px rgba(0,0,0,.16);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 20% 10%, rgba(0,231,255,.13), transparent 34%);
      opacity: .8;
      pointer-events: none;
    }

    .card > * {
      position: relative;
    }

    .card h3 {
      font-size: 1.28rem;
      line-height: 1.1;
      letter-spacing: -.025em;
      margin-bottom: 10px;
    }

    .card p {
      color: var(--muted);
    }

    .big-number {
      font-size: clamp(2.2rem, 4.5vw, 4.4rem);
      line-height: .9;
      color: var(--neon);
      font-weight: 1000;
      letter-spacing: -.08em;
      margin-bottom: 14px;
      text-shadow: 0 0 24px rgba(0,231,255,.24);
    }

    .story-stack {
      display: grid;
      gap: 14px;
    }

    .story {
      display: grid;
      grid-template-columns: 68px 1fr;
      gap: 16px;
      align-items: start;
      padding: 18px;
      border-radius: 24px;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.25);
    }

    .story-icon {
      width: 58px;
      height: 58px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      background: rgba(0,231,255,.11);
      border: 1px solid rgba(0,231,255,.26);
      font-size: 1.65rem;
      box-shadow: 0 0 24px rgba(0,231,255,.08);
    }

    .story h3 {
      font-size: 1.14rem;
      margin-bottom: 5px;
    }

    .story p {
      color: var(--muted);
    }

    .black-uniform {
      background:
        linear-gradient(135deg, rgba(0,0,0,.74), rgba(0,231,255,.08)),
        radial-gradient(circle at 80% 20%, rgba(0,231,255,.19), transparent 35%);
      border-color: rgba(0,231,255,.25);
    }

    .quote-panel {
      border-radius: calc(var(--radius) + 12px);
      border: 1px solid rgba(0,231,255,.24);
      background:
        radial-gradient(circle at top left, rgba(0,231,255,.18), transparent 28%),
        rgba(0,0,0,.32);
      padding: clamp(24px, 4vw, 46px);
      box-shadow: var(--shadow);
    }

    blockquote {
      font-size: clamp(1.55rem, 3.8vw, 3.2rem);
      line-height: 1.08;
      letter-spacing: -.045em;
      font-weight: 1000;
      text-wrap: balance;
      margin-bottom: 18px;
    }

    blockquote .slash {
      color: var(--neon);
    }

    .quote-panel p {
      color: var(--muted);
      max-width: 840px;
      font-size: 1.05rem;
    }

    .manifesto {
      display: grid;
      grid-template-columns: minmax(0, .9fr) minmax(0, 1.1fr);
      gap: 18px;
      align-items: start;
    }

    .sticky-title {
      position: sticky;
      top: 96px;
    }

    .long-copy {
      display: grid;
      gap: 16px;
    }

    .long-copy p {
      color: var(--soft);
      font-size: 1.03rem;
    }

    .long-copy strong {
      color: #fff;
    }

    .highlight {
      color: #001016;
      background: var(--neon);
      border-radius: 10px;
      padding: 1px 7px;
      font-weight: 1000;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }

    .confession {
      border-left: 4px solid var(--danger);
      padding: 16px 18px;
      border-radius: 0 20px 20px 0;
      background: rgba(255,93,158,.08);
      color: var(--soft);
      margin: 3px 0;
    }

    .confession b {
      color: #fff;
    }

    .formula-box {
      border-radius: calc(var(--radius) + 10px);
      border: 1px solid rgba(0,231,255,.26);
      background:
        radial-gradient(circle at 15% 15%, rgba(0,231,255,.22), transparent 32%),
        radial-gradient(circle at 85% 85%, rgba(117,255,184,.12), transparent 34%),
        rgba(2, 7, 18, .78);
      padding: clamp(24px, 4.5vw, 48px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .formula {
      font-size: clamp(1.35rem, 4vw, 3.4rem);
      line-height: 1.08;
      letter-spacing: -.055em;
      color: #fff;
      font-weight: 1000;
      margin: 16px 0 18px;
      word-break: break-word;
    }

    .formula span {
      color: var(--neon);
      text-shadow: 0 0 24px rgba(0,231,255,.35);
    }

    .pillars {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-top: 20px;
    }

    .pillar {
      min-height: 130px;
      padding: 14px;
      border-radius: 22px;
      background: rgba(255,255,255,.065);
      border: 1px solid rgba(255,255,255,.12);
    }

    .pillar b {
      display: block;
      color: var(--neon2);
      line-height: 1.05;
      margin-bottom: 8px;
    }

    .pillar small {
      color: var(--muted);
      line-height: 1.42;
      display: block;
    }

    .engine-steps {
      counter-reset: step;
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }

    .engine-step {
      counter-increment: step;
      display: grid;
      grid-template-columns: 46px 1fr;
      gap: 13px;
      padding: 17px;
      border-radius: 22px;
      background: rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.11);
    }

    .engine-step::before {
      content: counter(step);
      width: 44px;
      height: 44px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: rgba(0,231,255,.14);
      border: 1px solid rgba(0,231,255,.24);
      color: var(--neon);
      font-weight: 1000;
    }

    .engine-step h3 {
      font-size: 1.05rem;
      margin-bottom: 4px;
    }

    .engine-step p {
      color: var(--muted);
    }

    .fish-world {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(280px, .85fr);
      gap: 18px;
      align-items: center;
    }

    .animal-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .animal {
      min-height: 145px;
      border-radius: 26px;
      padding: 18px;
      border: 1px solid rgba(255,255,255,.13);
      background: rgba(255,255,255,.06);
    }

    .animal .emoji {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    .animal b {
      display: block;
      color: #fff;
      margin-bottom: 5px;
    }

    .animal small {
      color: var(--muted);
      display: block;
      line-height: 1.45;
    }

    .future-map {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }

    .future-item {
      border-radius: 26px;
      padding: 20px;
      background: rgba(255,255,255,.065);
      border: 1px solid rgba(0,231,255,.16);
      min-height: 198px;
    }

    .future-item h3 {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.1rem;
      margin-bottom: 10px;
      color: #fff;
    }

    .future-item ul,
    .clean-list {
      list-style: none;
      display: grid;
      gap: 7px;
    }

    .future-item li,
    .clean-list li {
      color: var(--muted);
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 7px;
      align-items: start;
    }

    .future-item li::before,
    .clean-list li::before {
      content: "•";
      color: var(--neon);
      font-weight: 1000;
    }

    .projects-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .project-mini {
      min-height: 170px;
      padding: 18px;
      border-radius: 24px;
      border: 1px solid rgba(0,231,255,.17);
      background: rgba(0,0,0,.26);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .project-mini b {
      color: #fff;
      font-size: 1.04rem;
      line-height: 1.15;
      display: block;
      margin-bottom: 8px;
    }

    .project-mini span {
      color: var(--muted);
      font-size: .93rem;
    }

    .project-mini small {
      color: var(--neon2);
      font-weight: 900;
      letter-spacing: .05em;
      text-transform: uppercase;
    }

    .cta-band {
      padding: 0 0 clamp(52px, 7vw, 90px);
    }

    .cta-panel {
      border-radius: calc(var(--radius) + 16px);
      padding: clamp(26px, 5vw, 54px);
      border: 1px solid rgba(0,231,255,.3);
      background:
        radial-gradient(circle at 18% 20%, rgba(0,231,255,.24), transparent 34%),
        linear-gradient(135deg, rgba(255,255,255,.11), rgba(0,0,0,.28));
      box-shadow: var(--shadow);
      text-align: center;
      overflow: hidden;
      position: relative;
    }

    .cta-panel::before,
    .cta-panel::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(32px);
      opacity: .45;
    }

    .cta-panel::before {
      width: 170px;
      height: 170px;
      background: var(--neon);
      left: -70px;
      top: -70px;
    }

    .cta-panel::after {
      width: 210px;
      height: 210px;
      background: rgba(117,255,184,.55);
      right: -120px;
      bottom: -100px;
    }

    .cta-panel > * {
      position: relative;
    }

    .cta-panel h2 {
      margin-inline: auto;
      max-width: 860px;
    }

    .cta-panel p {
      color: var(--soft);
      max-width: 760px;
      margin: 0 auto;
      font-size: 1.08rem;
    }

    footer {
      border-top: 1px solid rgba(0,231,255,.18);
      padding: 28px 0 38px;
      color: var(--muted);
      font-size: .85rem;
      text-align: center;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
      .nav-links {
        display: none;
      }

      .menu-toggle {
        display: flex;
      }

      .hero-grid {
        grid-template-columns: 1fr;
      }

      .hero-thumbnail {
        justify-self: center;
        max-width: 100%;
      }

      .grid-3 {
        grid-template-columns: repeat(2, 1fr);
      }

      .pillars {
        grid-template-columns: repeat(3, 1fr);
      }

      .projects-strip {
        grid-template-columns: repeat(2, 1fr);
      }

      .fish-world {
        grid-template-columns: 1fr;
      }

      .manifesto {
        grid-template-columns: 1fr;
      }

      .future-map {
        grid-template-columns: repeat(2, 1fr);
      }

      .sticky-title {
        top: 72px;
      }
    }

    @media (max-width: 480px) {
      .brand {
        min-width: auto;
      }

      .brand span {
        display: none;
      }

      .grid-3,
      .grid-2 {
        grid-template-columns: 1fr;
      }

      .pillars {
        grid-template-columns: repeat(2, 1fr);
      }

      .projects-strip {
        grid-template-columns: 1fr;
      }

      .animal-grid {
        grid-template-columns: 1fr;
      }

      .future-map {
        grid-template-columns: 1fr;
      }

      .pronounce {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <a href="#main" class="skip-link">Skip to main content</a>

  <div class="topbar">
    <div class="wrap">
      <nav class="nav">
        <div class="brand">
          <div class="logo-mark">C</div>
          <div>
            <strong>Cornelius</strong>
            <span>Aurelius</span>
          </div>
        </div>

        <button class="menu-toggle" id="menuToggle" aria-label="Toggle menu" aria-expanded="false">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <div class="nav-links" id="navLinks">
          <a href="#" class="home-icon">🏠</a>
          <a href="#work">Work</a>
          <a href="#journey">Journey</a>
          <a href="#philosophy">Philosophy</a>
          <a href="#contact">Contact</a>
        </div>
      </nav>

      <div class="mobile-menu" id="mobileMenu">
        <a href="#" class="home-icon">🏠 Home</a>
        <a href="#work">Work</a>
        <a href="#journey">Journey</a>
        <a href="#philosophy">Philosophy</a>
        <a href="#contact">Contact</a>
      </div>
    </div>
  </div>

  <main id="main">
    <!-- Rest of your HTML content goes here -->
  </main>

  <script>
    const menuToggle = document.getElementById('menuToggle');
    const mobileMenu = document.getElementById('mobileMenu');
    const navLinks = document.querySelectorAll('.mobile-menu a, .nav-links a');

    menuToggle.addEventListener('click', () => {
      menuToggle.classList.toggle('active');
      mobileMenu.classList.toggle('active');
      menuToggle.setAttribute('aria-expanded', menuToggle.classList.contains('active'));
    });

    // Close menu when a link is clicked
    navLinks.forEach(link => {
      link.addEventListener('click', () => {
        if (window.innerWidth <= 768) {
          menuToggle.classList.remove('active');
          mobileMenu.classList.remove('active');
          menuToggle.setAttribute('aria-expanded', 'false');
        }
      });
    });

    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.nav')) {
        menuToggle.classList.remove('active');
        mobileMenu.classList.remove('active');
        menuToggle.setAttribute('aria-expanded', 'false');
      }
    });
  </script>
</body>
</html>
